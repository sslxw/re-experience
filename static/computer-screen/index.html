<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Umbrella Archive — Resident Evil</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
</head>
<body>
    <a class="skip-link" href="#view-root">Skip to content</a>

    <div id="intro" role="dialog" aria-label="System boot">
        <div class="logo">Resident Evil</div>
        <div class="biohazard" aria-hidden="true">☣</div>
        <p class="tagline">Umbrella Corporation Secure Terminal</p>
        <button type="button" class="access-btn" id="access-btn">
            Access File System
        </button>
        <p class="hint">[ AUTHORIZED PERSONNEL ONLY ]</p>
    </div>

    <div id="shell" class="hidden" aria-live="polite">
        <header class="top-bar">
            <div class="top-bar-start">
                <a href="#/" class="brand-mark" aria-label="Raccoon City Archive home">
                    <img
                        class="brand-logo"
                        src="/textures/decor/umbrella_decal.png"
                        alt=""
                        width="36"
                        height="36"
                    />
                </a>
            </div>
            <div class="main-nav-wrap">
                <nav class="main-nav" id="main-nav" aria-label="Main navigation"></nav>
            </div>
            <div class="top-bar-end">
                <div class="archive-game-tools" id="archive-game-tools" hidden>
                    <button type="button" class="archive-game-btn" id="archive-journal-btn" aria-label="Field journal" title="Field journal">📓</button>
                    <button type="button" class="archive-game-btn" id="archive-help-btn" aria-label="How to play" title="How to play">?</button>
                </div>
                <div id="user-chip" class="user-chip-slot"></div>
                <nav class="auth-nav" id="auth-nav" aria-label="Account access"></nav>
            </div>
        </header>
        <main id="view-root" class="view-root" tabindex="-1"></main>
        <footer class="site-footer">
            <p>UMBRELLA CORP © 1998 — CLASSIFIED // STARS DIVISION</p>
        </footer>
    </div>

    <div class="fx-vignette" aria-hidden="true"></div>
    <div class="fx-overlay" aria-hidden="true"></div>

    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
